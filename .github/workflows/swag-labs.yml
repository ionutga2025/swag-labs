name: Swag Labs E2E Tests

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: true

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright tests
        id: playwright
        run: npx playwright test
        env:
          STANDARD_USER: ${{ secrets.STANDARD_USER }}
          LOCKED_USER: ${{ secrets.LOCKED_USER }}
          PROBLEM_USER: ${{ secrets.PROBLEM_USER }}
          PERFORMANCE_USER: ${{ secrets.PERFORMANCE_USER }}
          ERROR_USER: ${{ secrets.ERROR_USER }}
          VISUAL_USER: ${{ secrets.VISUAL_USER }}
          PASSWORD: ${{ secrets.PASSWORD }}

      - name: Add GitHub test summary
        if: always()
        run: |
          echo "#Swag Labs Playwright Report" >> $GITHUB_STEP_SUMMARY
          echo "- Download \`playwright-report\` artifact for the HTML report" >> $GITHUB_STEP_SUMMARY
          echo "- Download \`test-results\` artifact for traces, screenshots, and videos" >> $GITHUB_STEP_SUMMARY

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
